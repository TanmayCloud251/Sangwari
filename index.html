
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sangwari - Your Chhattisgarhi Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['var(--font-main)', 'Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --primary-color: #FF9800;
        --secondary-color: #0D9488;
        --bg-color: #FFFDF5;
        --surface-color: #FFF8E1;
        --text-color: #1F2937;
        --font-main: 'Outfit';
        --font-size-base: 16px;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: var(--font-main), sans-serif;
        font-size: var(--font-size-base);
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Custom Styled Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-color);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--primary-color);
        border-radius: 20px;
        border: 3px solid var(--bg-color);
        opacity: 0.8;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--secondary-color);
      }

      /* Firefox support */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--primary-color) var(--bg-color);
      }

      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      .wave-bar {
        animation: wave 1s ease-in-out infinite;
      }
      @keyframes wave {
        0%, 100% { height: 20%; }
        50% { height: 100%; }
      }

      /* Screen Transitions */
      @keyframes slide-up {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes slide-left {
        from { transform: translateX(30px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      .animate-screen-up {
        animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .animate-screen-left {
        animation: slide-left 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Gemini Live Orb Animations */
      @keyframes orb-rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes orb-morph {
        0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
        25% { border-radius: 73% 27% 23% 77% / 55% 55% 45% 45%; }
        50% { border-radius: 37% 63% 51% 49% / 30% 30% 70% 70%; }
        75% { border-radius: 56% 44% 49% 51% / 50% 50% 50% 50%; }
      }
      @keyframes orb-pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; filter: blur(40px); }
        50% { transform: scale(1.1); opacity: 1; filter: blur(30px); }
      }
      @keyframes orb-thinking {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
      }

      .orb-container {
        position: relative;
        width: 300px;
        height: 300px;
        display: flex;
        align-items: center;
        justify-center;
      }
      .orb-layer {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        filter: blur(40px);
        mix-blend-mode: screen;
        transition: all 1s ease-in-out;
      }
      .orb-active .orb-layer {
        animation: orb-morph 8s infinite alternate, orb-rotate 12s infinite linear;
      }
      .orb-speaking .orb-layer {
        animation: orb-morph 3s infinite alternate, orb-rotate 5s infinite linear, orb-pulse 0.5s infinite alternate;
      }
      .orb-thinking .orb-layer {
        animation: orb-rotate 2s infinite linear;
        filter: blur(50px);
      }
    </style>

  }
}
</script>
